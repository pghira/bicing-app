<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bora</title>
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Bora">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon-512.png">
    <link rel="apple-touch-icon" href="icon-512.png">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=15">
</head>
<body>
    <div id="notification-container"></div>

    <div class="app-wrapper">
        
        <!-- Full Screen Map Container -->
        <div id="map-3d-wrapper">
            <div id="map"></div>
        </div>
        
        <!-- Floating Header -->
        <div class="floating-header">
            <h1>Bora</h1>
            <div style="display:flex; gap: 10px; align-items:center;">
                <div id="compass-icon" style="font-size: 1.8rem; transition: transform 0.1s linear; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5));">🧭</div>
                <button id="settings-btn" class="glass-btn icon-only">
                    ⚙️
                </button>
            </div>
        </div>

        <!-- Floating Dashboard (Bottom) -->
        <div class="dashboard-panel">
            <div id="route-stats" class="hidden">
                <div class="stat-box">
                    <span class="stat-label">Walk Time</span>
                    <span id="eta-text" class="stat-value">--</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">Distance</span>
                    <span id="dist-text" class="stat-value">--</span>
                </div>
            </div>
            
            <button id="find-btn" class="glass-btn primary giant-btn full-width">
                <span style="font-size: 1.5rem">🚴</span> BORA
            </button>
        </div>
    </div>

    <div id="settings-modal" class="modal hidden">
        <div class="modal-content glass-panel">
            <div class="modal-header">
                <h2>Settings</h2>
                <button id="close-settings" class="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="input-group">
                    <label for="ebike-threshold">Min. E-Bikes Available</label>
                    <input type="number" id="ebike-threshold" min="1" value="2">
                </div>
                <button id="save-settings" class="glass-btn primary full-width">Save & Apply</button>
            </div>
        </div>
    </div>

    <!-- Notification system -->
    <div id="notification-container"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="app.js?v=18"></script>
</body>
</html>
